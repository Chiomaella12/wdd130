<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | The Rapids</title>
    <meta name="description"
      content="This is our contact page, where you can contact us for a thrilling and exciting rafting experiences">
    <meta name="author" content="chioma ella asoh">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-crossedoars.jpeg" alt="cross-doars-logo-icon" width="200">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="Company-info">
            <h1> Contact Us </h1>
            <p>56 Housing Estate</p>
            <p>G.R.A,Nigeria</p>
            <p>phone: +234 903 367 4112</p>
            <p> Email:<a href="email">Therapids@gmail.com</a></p>
            </section>
            <section class="contact-container">
                <div class="map">
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d507473.33707174467!2d7.5126355!3d6.4408386!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sng!4v1780748786958!5m2!1sen!2sng"
                      width="600" height="450" allowfullscreen="" loading="lazy"
                      referrerpolicy="no-referrer-when-downgrade"></iframe>

                </div>


                <div class="contact-form">
                    <form><!--Name-->
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                        <br>


                        <!--Email-->
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>

                        <p> Message Purpose</p>
                        <input type="radio" id="general" name="purpose">
                        <label for="general">General Inquiry</label>
                        <br>
                        <input type="radio" id="reservation" name="purpose">
                        <label for="reservation">Reservation Question</label>
                        <br>
                        <input type="radio" id="suggestion" name="purpose">
                        <label for="suggestion">Website Suggestion</label>
                        <br><br>
                        <label for="message">Message</label><br>
                        <textarea id="message" name="message"></textarea>
                        <br>
                        <input type="checkbox" id="newsletter" name="newsletter">
                        <label for="newsletter"> Please subscribe me to the monthly
                            newsletter</label>
                        <br><br>
                        <button type="submit"> Get In Touch!</button>
                    </form>
                </div>
            </section>

            <section class="employees">
                <h2>We Are Here to Serve You</h2>
                <figure>
                    <img src="images/employee1.jpg" alt="happy worker">
                    <figcaption>General Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/employee5.jpg" alt="ready to work">
                    <figcaption>Customer Services</figcaption>
                </figure>
                <figure>
                    <img src="images/employee4.jpg" alt=" work.com">
                    <figcaption> Reservation Manager</figcaption>
                </figure>


            </section>
    </main>
    <footer>

        <p> ©2026|The Rapids!| Chioma Ella Asoh</p>

        <nav class="socialmedia">
            <a href="https://whatsapp.com">
                <img src="images/whatsapp.png" alt="whatsapp icon">
            </a>
            <a href="https://facebook.com">
                <img src="images/facebook.png.png" alt="facebook icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="instagram icon">
            </a>
        </nav>
    </footer>
</body>

</html>
